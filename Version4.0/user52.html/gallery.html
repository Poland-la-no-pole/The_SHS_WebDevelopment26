<!DOCTYPE html>
<html lang="en">

<head>

    <title>Gallery</title>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="SHS WebDev Version 4.0 - Gallery">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/gallery.css">

</head>

<body>

<!-- NAV BAR (unchanged) -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a href="#" class="navbar-brand">WebDev</a>
    </div>
</nav>

<main class="container-fluid mt-3">

    <h1 class="my-3">Check out my favorite images</h1>

    <!-- GALLERY -->
    <div id="gallery">

        <p>Hover over the images to get the answer</p>

        <!-- CARD 1 -->
        <div class="container">
            <div class="flipper">
                <div class="front">
                    <img src="images/Tracer.jpeg" alt="Tracer">
                    <p class="caption">Tracer</p>
                </div>
                <div class="back">
                    <h2>Tracer</h2>
                    <p>Fast movement and accuracy.</p>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="container">
            <div class="flipper">
                <div class="front">
                    <img src="images/ghost.jpeg" alt="Ghost">
                    <p class="caption">Ghost</p>
                </div>
                <div class="back">
                    <h2>Ghost</h2>
                    <p>Stealth and precision style.</p>
                </div>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="container">
            <div class="flipper">
                <div class="front">
                    <img src="images/jetspeed.jpeg" alt="Jetspeed">
                    <p class="caption">Jetspeed</p>
                </div>
                <div class="back">
                    <h2>Jetspeed</h2>
                    <p>Built for speed and quick reactions.</p>
                </div>
            </div>
        </div>

        <!-- CARD 4 -->
        <div class="container">
            <div class="flipper">
                <div class="front">
                    <img src="images/prodo.jpeg" alt="Prodo">
                    <p class="caption">Prodo</p>
                </div>
                <div class="back">
                    <h2>Prodo</h2>
                    <p>Light control and handling.</p>
                </div>
            </div>
        </div>

    </div>

</main>

</body>
</html>
