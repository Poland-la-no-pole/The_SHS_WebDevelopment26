<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 4.0</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Titles using subclasses -->
    <h1 class="title title-large">My Button Page</h1>
    <p class="title title-small">Styled with CSS Classes</p>

    <!-- Button Table -->
    <table id="hireButtons">
        <tr>
            <td><button class="button">Default</button></td>
            <td><button class="button button-blue">Blue</button></td>
            <td><button class="button button-red">Red</button></td>
            <td><button class="button button-rounded">Rounded</button></td>
            <td><button class="button button-shadow">Shadow</button></td>

            <!-- Your 3 new buttons -->
            <td><button class="button button-glow">Glow</button></td>
            <td><button class="button button-largeRadius">Large Radius</button></td>
            <td><button class="button button-outline">Outline</button></td>
        </tr>
    </table>

    <!-- Footer -->
    <table id="footerTable">
        <tr>
            <td>Footer Content Here</td>
        </tr>
    </table>

</body>
</html>
