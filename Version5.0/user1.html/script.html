    <main class="m-3" id="content">

        <h1 class="text-left my-3">

        <!-- Edit this line for the title of your page -->

        <!--↓↓↓↓↓↓↓↓↓↓↓↓↓↓ Put your content below this line ↓↓↓↓↓↓↓↓↓↓↓↓↓↓-->

        <div class="container-fluid">

            <div class="row text-center">

                <div class="col-sm-4 p-3 bg-warning">

                    <p id="textChange">
                        My name is User ##
                    </p>

                    <button class="btn btn-dark"
                    onclick="changeText()">

                        Change Text

                    </button>

                </div>

                <div class="col-sm-4 p-3 bg-info">

                    <button class="btn btn-primary"
                    onclick="bgChange()">

                        Change Background

                    </button>

                    <br><br>

                    <button class="btn btn-success"
                    onclick="showAlert()">

                        Alert Box

                    </button>

                </div>

                <div class="col-sm-4 p-3 bg-warning">

                    <button class="btn btn-danger"
                    onclick="bigText()">

                        Bigger Text

                    </button>

                    <br><br>

                    <button class="btn btn-dark"
                    onclick="hideText()">

                        Hide Text

                    </button>

                </div>

            </div>

            <br>

            <div class="row text-center">

                <div class="col-sm-4 p-3 bg-secondary text-white">

                    <p id="time"></p>

                    <button class="btn btn-light"
                    onclick="showTime()">

                        Show Time

                    </button>

                </div>

                <div class="col-sm-4 p-3 bg-success">

                    <button class="btn btn-warning"
                    onclick="changeColor()">

                        Change Text Color

                    </button>

                </div>

                <div class="col-sm-4 p-3 bg-dark text-white">

                    <button class="btn btn-info"
                    onclick="showMessage()">

                        Secret Message

                    </button>

                    <p id="secret"></p>

                </div>

            </div>

        </div>

    </main>
