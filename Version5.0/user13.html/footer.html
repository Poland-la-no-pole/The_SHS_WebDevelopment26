<!DOCTYPE html>
<html>
    <head>
        <title> Kevin's Footer </title>

        <!--Bootstrap-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">

    <!--Styling-->
        <style>
            * {
                background-color: rgb(118, 118, 220);
                border: 5px;
            }

            a {
                color: black;
            }

            a:hover {
                color: aqua;
            }

            .spacer {
                width: 100%;
                height: 650px;
                background-color: beige;
            }

            .spacer p {
                background-color: beige;
            }

        </style>
    </head>
    <body>
        <main>
            <div class="spacer">
                <p> blah blah blah blah </p> 
            </div>
        </main>

        

    <!--FOOTER-->
        <footer>
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-4">
                        <p> Link 1 </p>
                    </div>

                    <div class="col-md-2">
                        <p> Link 2 </p>
                    </div>

                    <div class="col-md-6">
                        <p> Link 3 </p>
                    </div>

                </div>

            </div>
            
        </footer>
    </body>



</html>
