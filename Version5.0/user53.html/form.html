<head>
    <title>Bootstrap Form</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Sign In Form</h2>

    <!-- FORM -->
    <form action="confirmation.html">

        <!-- EMAIL -->
        <div class="mb-3">
            <label for="inputEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="inputEmail" placeholder="Enter email" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label for="inputPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="inputPassword" placeholder="Enter password" required>
        </div>

        <!-- CHECKBOX -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
                Remember me
            </label>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-primary">
            Sign In
        </button>

    </form>

</div>

</body>
</html>
