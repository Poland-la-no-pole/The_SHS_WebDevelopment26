<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theo Bootstrap Navbar</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        footer {
            font-size: 12px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">

        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="#">Theo WebDev</a>

        <!-- Toggle Button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Content -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left Links -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Start</a>
                </li>

                <!-- DROPDOWN MENU (ADDED HERE) -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        Sell
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Products</a></li>
                        <li><a class="dropdown-item" href="#">Services</a></li>
                        <li><a class="dropdown-item" href="#">Pricing</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Market</a>
                </li>
            </ul>

            <!-- Search Bar -->
            <form class="d-flex me-3">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <!-- Right Side Links -->
            <ul class="navbar-nav align-items-center">

                <li class="nav-item">
                    <a class="nav-link" href="#">Log in</a>
                </li>

                <li class="nav-item ms-2">
                    <a class="btn btn-success" href="#">Start Free Trial</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="p-5 bg-primary-subtle text-center">
    <h4>Bootstrap Examples</h4>
    <p class="lead">Navbar Assignment</p>
</header>

<!-- MAIN -->
<main class="container mt-4">
    <p class="text-center"></p>
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white mt-5">
    <div class="container p-4">
        <div class="row">

            <div class="col-md-4">
                <h5>Theo WebDev</h5>
                <p>This website was created by Theo using Bootstrap 5.</p>
            </div>

            <div class="col-md-4">
                <h5>Links</h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-white text-decoration-none">Home</a></li>
                    <li><a href="#" class="text-white text-decoration-none">Portfolio</a></li>
                    <li><a href="#" class="text-white text-decoration-none">Gallery</a></li>
                </ul>
            </div>

            <div class="col-md-4 text-center">
                <h5>Follow Theo</h5>
                <i class="fa-brands fa-facebook fa-2x mx-2"></i>
                <i class="fa-brands fa-instagram fa-2x mx-2"></i>
                <i class="fa-brands fa-github fa-2x mx-2"></i>
            </div>

        </div>
    </div>

    <div class="text-center p-3 bg-secondary">
        © 2026 Theo
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

</body>
</html>
