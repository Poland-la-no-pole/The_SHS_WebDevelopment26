<figcaption class="head caption"> D'Angelo Ponds is a 5'9,170LB cornerback out of Indiana University. Coming from Hollywood,FL he was a 3 star recruit. At first, he commited to James Madison university but his head coach was hired at IU and he transferred there. He led the Hoosiers to a playoff spot in year 1 with them and a national championship in his 2nd year. He was a key part of their run. He didn't participate in the combine except the vertical jump where he reached a 43'5. His play in college and production led him to be picked in round 2 by the Jets. </figcaption>
