<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Ries Restoration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
</head>

<body class="contact-page">

<!-- TOP BAR -->
<nav class="top-bar py-2 px-4 text-white" style="background-color:#083806;">

  <div class="d-flex justify-content-between align-items-center">

    <div>
      Give us a call: 555-555-5555
    </div>

    <div>
      Get a free estimate today!
    </div>

  </div>

</nav>

<!-- MAIN NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between align-items-center" style="background-color:#0D0D0D;">

  <div class="d-flex align-items-center gap-2">
    <img src="images/RRlogo.jpg" alt="RR Logo" height="95" width="115">
    <h1 class="navbar-title">Ries Restoration LLC</h1>
  </div>

  <div class="d-flex gap-4">
    <a class="nav-link text-white" href="index.html">Home</a>
    <a class="nav-link text-white" href="about.html">About</a>
    <a class="nav-link text-white" href="services.html">Services</a>
    <a class="nav-link text-white" href="gallery.html">Gallery</a>
    <a class="nav-link text-white" href="contact.html">Contact</a>
  </div>

</nav>

<!-- CONTACT SECTION -->
<section class="contact-hero d-flex justify-content-center align-items-center">

  <div class="container d-flex justify-content-center">

    <div class="col-md-6">

      <div class="p-4 shadow rounded text-white" style="background-color:#0D0D0D;">

        <h3 class="contact-box text-center mb-4">Contact Us Now!</h3>

        <form>

          <input class="form-control mb-3" placeholder="Full Name">

          <input class="form-control mb-3" placeholder="Email Address">

          <input class="form-control mb-3" placeholder="Phone Number">

          <input class="form-control mb-3" placeholder="Street Address">

          <div class="row">

            <div class="col-md-6">
              <input class="form-control mb-3" placeholder="City">
            </div>

            <div class="col-md-6">
              <input class="form-control mb-3" placeholder="Zip Code">
            </div>

          </div>

          <select class="form-select mb-3">
            <option selected>Select A Service</option>
            <option>Landscaping</option>
            <option>Tree Trimming</option>
            <option>Land Clearing</option>
            <option>Snow Removal</option>
            <option>Other/more than 1 service</option>
          </select>

          <textarea class="form-control mb-3" rows="4" placeholder="How can we help you?"></textarea>

          <button class="btn btn-light w-100">
            Submit
          </button>

        </form>

      </div>

    </div>

  </div>

</section>

</body>
</html>
