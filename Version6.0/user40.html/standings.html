<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Standings</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>NHL Standings</h1>
    <h2>Eastern Conference</h2>
    <table>
        <thead>
            <tr>
                <th>Team</th>
                <style>
                    body { font-family: Arial, sans-serif; margin: 20px; background-color: #ffffff; color: #000000; }
                    table { border-collapse: collapse; width: 100%; }
                    th, td { border: 1px solid #000000; padding: 8px; text-align: left; }
                    th { background-color: #cc0000; color: #ffffff; }
                    tr:nth-child(even) { background-color: #f5f5f5; }
                </style>
                <th>Wins</th>
                <th>Losses</th>
                <th>OT Losses</th>
                <th>Points</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Boston Bruins</td><td>50</td><td>20</td><td>10</td><td>110</td></tr>
            <tr><td>Carolina Hurricanes</td><td>48</td><td>22</td><td>10</td><td>106</td></tr>
            <tr><td>New York Rangers</td><td>45</td><td>25</td><td>10</td><td>100</td></tr>
            <!-- Add more teams as needed -->
        </tbody>
    </table>
    
    <h2>Western Conference</h2>
    <table>
        <thead>
            <tr>
                <th>Team</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>OT Losses</th>
                <th>Points</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Colorado Avalanche</td><td>52</td><td>18</td><td>10</td><td>114</td></tr>
            <tr><td>Dallas Stars</td><td>50</td><td>20</td><td>10</td><td>110</td></tr>
            <tr><td>Vegas Golden Knights</td><td>48</td><td>22</td><td>10</td><td>106</td></tr>
            <!-- Add more teams as needed -->
        </tbody>
    </table>
</body>
</html>
