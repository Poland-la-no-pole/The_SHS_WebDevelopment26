<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #222;
            background: linear-gradient(135deg, #f0f4ff, #d9e7ff);
        }
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            margin: 0 0 1rem;
            font-size: 2.5rem;
            color: #1f3d7a;
        }
        p {
            margin: 0 0 1.5rem;
            line-height: 1.6;
            color: #4b5563;
        }
        a.button {
            display: inline-block;
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        a.button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Welcome to Your Page</h1>
            <p>Get started with your website by adding content, navigation, and style. This is a simple welcome page to help you begin your project.</p>
            <a class="button" href="#">Explore</a>
        </div>
    </div>
</body>
</html>
