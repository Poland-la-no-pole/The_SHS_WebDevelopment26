<head>

<!-- External CSS -->
<link rel="stylesheet" href="CSS/style.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png">

    <style>
      * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Impact, sans-serif;
        }

        body {
            background-image: url("https://cdn.wnba.com/sites/4/2025/08/Thumbnail-46.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            min-height: 100vh;
          }
    

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000000;
            padding: 15px 30px;
            width: 100vw;
        }

        .nav-left, .nav-right {
            display: flex;
            gap: 25px;
        }

        .nav-left a, .nav-right a {
            color: rgb(255, 255, 255);
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-left a:hover, .nav-right a:hover {
            color: orange;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgb(255, 255, 255);
            font-size: 20px;
            font-weight: bold;
        }

        .logo-section img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: rgb(255, 255, 255);
            height: 70vh;
            text-align: center;
            flex-direction: column;
            padding-top: 40px;
        }

        .hero h1 {
            font-size: 150px;
            margin-bottom: 20px;
        }
        .hero img {
            width: 600px;
            margin-top: 20px;
            border-radius: 0px;
        }
        footer {
        text-align: center;
        color: white;
        padding: 53px;
        background-color: rgba(0, 0, 0, 0.8);
        margin-top: 50px;
        }
        
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <div class="navbar">

        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="Teams.html">Teams</a>
        </div>

        <div class="logo-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png" alt="Basketball">
            Professional Women's Basketball
        </div>

        <div class="nav-right">
            <a href="Players.html">Players</a>
            <a href="Expansion.html">Expansion</a>
        </div>

    </div>
    <!-- Heading Section  -->
    <div class="hero">
        <h1> WNBA</h1>
    </div>
