<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge Gaming | Home</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="custom-navy-header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
            <div class="container">
                <a class="navbar-brand fw-bold text-white" href="index.html">
                    <i class="fa-solid fa-gamepad me-2"></i>PixelForge Gaming
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gamingNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="gamingNav">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="index.html">Home</a>
                        <a class="nav-link" href="about.html">About</a>
                        <a class="nav-link" href="arcade.html">Arcade</a>
                        <a class="nav-link" href="leaderboard.html">Leaderboard</a>
                        <a class="nav-link active" href="contact.html">Contact</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

   <main class="container my-5 shadow-sm rounded p-4">
        <h2><i class="fa-solid fa-envelope me-2"></i>Join the PixelForge Clan</h2>
        <p class="text-muted">Register an account to save your scores automatically and receive updates on beta tests.</p>
        
        <form>
            <div class="mb-3">
                <label for="gamerTag" class="form-label fw-bold">GamerTag</label>
                <input type="text" class="form-control" id="gamerTag" placeholder="Enter your display name" required>
            </div>
            <div class="mb-3">
                <label for="gamerEmail" class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="gamerEmail" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="favGenre" class="form-label fw-bold">Preferred Game Type</label>
                <select class="form-select" id="favGenre">
                    <option selected>Arcade Shooter</option>
                    <option>Grid Puzzle</option>
                    <option>Platformer</option>
                </select>
            </div>
            <button type="submit" class="btn btn-dark px-4 py-2">Create Account</button>
        </form>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-2">&copy; 2026 PixelForge Gaming. Built with HTML, CSS, and Bootstrap.</p>
        <div>
            <a href="#" class="text-white mx-2"><i class="fa-brands fa-discord fa-lg"></i></a>
            <a href="#" class="text-white mx-2"><i class="fa-brands fa-twitch fa-lg"></i></a>
            <a href="#" class="text-white mx-2"><i class="fa-brands fa-youtube fa-lg"></i></a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
