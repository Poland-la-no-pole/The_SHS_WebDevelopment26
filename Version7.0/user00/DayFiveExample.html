<!DOCTYPE html>
<html lang="en">
    <head>
        <script>
            function example(){
                const userIn = document.getElementById("myText").value;
                if (userIn == "cake"){
                    alert("I like cake too!");
                } else if (userIn == "Ice Cream"){
                    alert("I love Ice Cream!");
                } else if (userIn == "pizza"){
                    alert("Pizzas are pretty good.");
                } else {
                    alert("We no like that.");
                }
            alert("Done!");
            }
        
        </script>
    </head>
    <body>
        <input type="text" id="myText"/>
        <button onclick="example()">Submit</button>
    </body>
</html>
