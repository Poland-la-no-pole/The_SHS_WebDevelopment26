            <div class="container">
                <h2>Simple Calculator</h2>
            <input type="text" id="numb"/> + <input type="text" id="numbe"/> 
            <button class="btn btn-danger btn-lg" value="Calculate" onclick="calcSum">Calculate</button>
            <span id="sumedResult">The sum will be displayed here</span>
            <script>
                function calcSum() {
                    let numb = Number(document.getElementById("numb").value);
                    let numbe = Number(document.getElementById("numbe").value);
                    let sum = Number(document.write(numb + numbe));
                    document.getElementById("sumedResult").innerHTML = numb + " + " + numbe + " = " + sum;
                    
            }

            <script>
                function calcProd() {

        <script>
            function calcHypotenuse() {
                let sideA = document.getElementById("sideA").value;
                let sideB = document.getElementById("sideB").value;
                let hypotenuse = Math.sqrt(Math.pow(sideA, 2) + Math.pow(sideB, 2));
