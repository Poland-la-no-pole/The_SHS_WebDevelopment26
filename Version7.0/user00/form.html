<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body> 
        <form method="POST" action="https://script.google.com/macros/s/AKfycbwiOqvibtlsn89TXP1mIZoHInrCrwkzFJrWO5057xJdlCcQougmwAB4zet8MCiBVs_Cqg/exec">
            <input name="email" type="email" placeholder="email" required>
            <input name="name" type="text" placeholder="name" required>
            <input name="color" type="text" placeholder="color" required>
            <input name="other" type="text" placeholder="other" required>
            <button type="submit">Send</button>
        </form>
        <script>
            window.addEventListener("load", function() {
            const form = document.getElementById('my-form');
            form.addEventListener("submit", function(e) {
                e.preventDefault();
            const data = new FormData(form);
            const action = e.target.action;
            fetch(action, { method: 'POST', body: data,
            })
            .then(() => {
            alert("Success!");
            })
            .catch(() => {
            alert("Error!");
            });
            });
            });
        </script>
    </body>
</html>
