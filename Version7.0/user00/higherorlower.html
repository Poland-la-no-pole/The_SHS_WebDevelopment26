<!DOCTYPE html>
<html>
    <head>
        <title>Higher or Lower</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
            function isNegative(){
                //Your code for exercise one here
                if (Number(document.getElementById("numb").value) < 0){
                    document.getElementById("outError").innerHTML = "The number is negative.";
                } else {
                    document.getElementById("outError").innerHTML = "The number is not negative.";
                }
            }
        </script>
        <script>
            function isNegOrNon(){
                //Your code for exercise two here
                if (Number(document.getElementById("numb").value) < 0){
                    document.getElementById("outError").innerHTML = "The number is negative.";
                } else if (Number(document.getElementById("num").value) == 0){
                    document.getElementById("outError").innerHTML = "The number is zero.";
                } else {
                    document.getElementById("outError").innerHTML = "The number is positive.";
                }
            }
        </script>
        <script>
            function isNegOrNonOrNan(){
                //Your code for exercise three
                if (isNaN(Number(document.getElementById("numb").value))){
                    document.getElementById("outError").innerHTML = "The input is not a number.";
                } else if (Number(document.getElementById("num").value) < 0){
                    document.getElementById("outError").innerHTML = "The number is negative.";
                } else if (Number(document.getElementById("num").value) == 0){
                    document.getElementById("outError").innerHTML = "The number is zero.";
                } else {
                    document.getElementById("outError").innerHTML = "The number is positive.";
                }
            }
        </script>
        <script>
            function higherOrLower(){
                let num = Number(document.getElementById("numb").value);
                const val = randomInt(1, 20);
                    if (num > 10){
                        document.getElementById("outError").innerHTML = "The number is higher than 10.";
                    } else if (num < 10){
                        document.getElementById("outError").innerHTML = "The number is lower than 10.";
                    } else {
                        document.getElementById("outError").innerHTML = "The number is equal to 10.";
                    }
            }
        </script>
        <script>
            const answer = Math.floor(Math.random() * 2000) + 1;
            function resetAnswer(){
                answer = Math.floor(Math.random() * 2000) + 1;
            }
        </script>
        <script>
            
            function checkGuess(){
                let num = Number(document.getElementById("num").value);
                if (num > answer){
                    alert( "Your guess is too high.");
                } else if (num < answer){
                    alert("Your guess is too low.");
                } else {
                    alert("Congratulations! You guessed the number!");
                }
            }
        </script>

    </head>

    <body>
        <main>
            Number:
            <input id="numb" type="text"/>
            <input id="exerciseOne" onclick="isNegative()" type="button" value="Exercise One" />
            <input id="exerciseTwo" onclick="isNegOrNon()" type="button" value="Exercise Two" />
            <input id="exerciseThree" onclick="isNegOrNonOrNaN()" type="button" value="Exercise Three" />
            <input id="exerciseFour" onclick="higherOrLower()" type="button" value="Exercise Four" />
        
            <h2>Higher or Lower</h2>
            Guess a number between 1 and 2000:

            <input id="num" type="text"/><button onclick="checkGuess()">Submit</button><button onclick="resetAnswer()">Reset</button>
            <div id="outError2">Output</div>
