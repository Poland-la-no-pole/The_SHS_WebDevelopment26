<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower</title>

    <!-- Q2: Random number between 1 and 100 assigned to variable 'answer' -->
    <script>
        var answer = Math.floor(Math.random() * 100) + 1;
    </script>

    <style>
        /* Q1: CSS to match the screenshot */
        body {
            background-color: black;
            color: white;
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 30px;
        }

        p {
            font-size: 1em;
            margin-bottom: 8px;
        }

        input[type="text"] {
            background-color: white;
            color: black;
            border: 1px solid white;
            padding: 4px;
            font-size: 1em;
            width: 200px;
        }

        button {
            padding: 4px 12px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Higher or Lower</h1>
    <p>Guess a number between 1 and 100:</p>
    <div>
        <input type="text" id="userGuess">
        <button onclick="checkGuess()">Submit</button>
    </div>

    <script>
        /* Q3, Q4, Q5: checkGuess() function */
        function checkGuess() {
            var userInput = document.getElementById("userGuess").value;
            var guess = Number(userInput);

            // Q4: Compare guess to answer and alert accordingly
            if (guess < answer) {
                alert("Higher");
            } else if (guess > answer) {
                alert("Lower");
            } else {
                alert("Success");
            }

            // Q5: Clear the input box after each guess
            document.getElementById("userGuess").value = "";
        }
    </script>

</body>

</html>
