<!DOCTYPE html>
<html>
<head>
    <title>Higher or Lower</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3.2rem;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .game-container {
            display: inline-block;
            text-align: center;
        }
        label {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 200px;
            padding: 4px;
            font-size: 1rem;
        }
        input[type="button"] {
            padding: 4px 12px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
    <script>
        
        const answer = Math.floor(Math.random() * 100) + 1;

        function checkGuess(){
            const userGuess = Number(document.getElementById("num").value);

            if (userGuess < answer) {
                alert("higher");
            } else if (userGuess > answer) {
                alert("lower");
            } else if (userGuess === answer) {
                alert("Success");
            }
        }
    </script>
</head>
<body>

    <h1>Higher or Lower</h1>
    
    <div class="game-container">
        <label for="num">Guess a number between 1 and 100:</label>
        <input id="num" type="text" />
        <input onclick="checkGuess()" type="button" value="Submit" />
    </div>

    <div id="outError"></div>

</body>
</html>
