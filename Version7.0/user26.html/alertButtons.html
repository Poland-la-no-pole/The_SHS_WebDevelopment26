<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Button Functions</title>
</head>
<body>
    <h1>Alert Button Functions</h1>
    <p>Click each button to run its assigned function.</p>
    <button onclick="showOneAlert()">One</button>
    <button onclick="showTwoAlerts()">Two</button>
    <button onclick="showThreeAlerts()">Three</button>

    <script>
        function showOneAlert() {
            alert('Button One: This is one alert.');
        }

        function showTwoAlerts() {
            alert('Button Two: First alert.');
            alert('Button Two: Second alert.');
        }

        function showThreeAlerts() {
            alert('Button Three: First alert.');
            alert('Button Three: Second alert.');
            alert('Button Three: Third alert.');
        }
    </script>
</body>
</html>
