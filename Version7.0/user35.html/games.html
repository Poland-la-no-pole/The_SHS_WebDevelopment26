<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Games</title>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="JavaScript Games">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

    <style type="text/css">
        #snakeCanvas {
            border: 5px solid #343a40;
            background-color: #ffffff;
            display: block;
            margin: 20px auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
        }
        .game-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-md p-2 navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="http://shakonet.isd720.com" class="navbar-brand">WebDev</a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav">
                    <a href="index.html" class="nav-item nav-link">Home</a>
                    <a href="games.html" class="nav-item nav-link active">Games</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="container mt-4">
        <h1 class="text-center mb-4">The Saber Game Room</h1>

        <div class="game-card text-center">
            <h3>Reaction Time Test</h3>
            <p>Click "Start", wait for the background to change, then click "Stop!"</p>
            
            <form name="response" class="row justify-content-center g-3">
                <div class="col-auto">
                    <select name="bgColorChange" class="form-select">
                        <option selected>deeppink</option>
                        <option>aliceblue</option>
                        <option>crimson</option>
                        <option>cadetblue</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="button" class="btn btn-success" onClick="startit()">Start</button>
                    <button type="button" class="btn btn-danger" onClick="stopTest()">Stop!</button>
                </div>
            </form>
        </div>

        <div class="game-card text-center">
            <h3>Saber Snake</h3>
            <p>Use the <b>Arrow Keys</b> to move. Get 5 points to change colors!</p>
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <h4 id="scoreBoard">Score: 0</h4>
        </div>

    </main>

    <footer class="small text-center py-4" id="footer">
        <p>Webpage made by <a href="index.html">[Your Name]</a></p>
    </footer>

    <script>
        /* --- REACTION TESTER --- */
        var startTime, endTime, startPressed = false, bgChangeStarted = false;

        function startit() {
            if (startPressed) return;
            startPressed = true;
            // CHANGE 1: Modified randomness to wait up to 8 seconds instead of 6
            var waitTime = Math.floor(Math.random() * 8000); 
            setTimeout('startTest()', waitTime);
        }

        function startTest() {
            document.body.style.background = document.response.bgColorChange.value;
            bgChangeStarted = true;
            startTime = new Date();
        }

        function stopTest() {
            if (bgChangeStarted) {
                endTime = new Date();
                var responseTime = (endTime.getTime() - startTime.getTime()) / 1000;
                document.body.style.background = "#f8f9fa";
                
                // CHANGE 2: Added a custom remark logic for extremely fast reactions
                var feedback = remark(responseTime);
                if (responseTime < 0.20) { feedback = "ULTRA INSTINCT! " + feedback; }
                
                alert("Your time: " + responseTime + "s\n" + feedback);
                startPressed = false;
                bgChangeStarted = false;
            } else {
                alert(startPressed ? "Too early!" : "Press Start first!");
            }
        }

        function remark(t) {
            if (t < 0.25) return "Well done!";
            if (t < 0.50) return "Nice!";
            if (t < 1.00) return "Could be faster...";
            return "Did you fall asleep?";
        }

        /* --- SNAKE GAME --- */
        var canvas = document.getElementById("snakeCanvas");
        var ctx = canvas.getContext("2d");
        var box = 20, score = 0, d;
        var snake = [{ x: 9 * box, y: 10 * box }];
        var food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };

        document.addEventListener("keydown", function(e) {
            if (e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (e.keyCode == 38 && d != "DOWN") d = "UP";
            else if (e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            for (let i = 0; i < snake.length; i++) {
                // CHANGE 3: Logic change - Snake turns Green only when score is 5 or higher
                ctx.fillStyle = (score >= 5) ? "#28a745" : "#343a40";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "white";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("scoreBoard").innerHTML = "Score: " + score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= 400 || snakeY < 0 || snakeY >= 400 || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        var game = setInterval(draw, 100);
    </script>
</body>
</html>
