<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Webpage</title>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Introduction to JavaScript">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="CSS/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

    <style>
        /* Internal Styling if needed */
        main { padding-bottom: 100px; }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="http://shakonet.isd720.com" class="navbar-brand">WebDev</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link active">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="games.html" class="nav-link">Games</a>
                    </li>
                </ul>
                <form class="d-flex">
                    <button class="btn btn-primary" type="button">Login</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container-fluid mt-3">
        
        <div id="built-in-functions" class="container-fluid mb-4">
            <div class="row text-center">
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="window.print()">Print Page</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-dark w-100" onclick="document.getElementById('len').innerHTML = document.title.length">Title Length</button>
                    <p id="len" class="mt-2 fw-bold"></p>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-dark w-100" onclick="document.getElementById('dt').innerHTML = Date()">Get Date</button>
                    <p id="dt" class="mt-2 small"></p>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="document.getElementById('bottomBtn').focus()">Focus Bottom</button>
                </div>
                <div class="col-md-2">
                    <label>Hover to Click:</label>
                    <input type="checkbox" id="Check" onmouseover="this.click()">
                </div>
            </div>
        </div>

        <hr>

        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6">
                    <h1 onmouseover="alert('GO Sabers!');" class="display-5 mb-3">Heading for a long list</h1>
                    
                    <ol id="nestedList">
                        <li>Main Item 1</li>
                        <li>Main Item 2</li>
                        <li>Main Item 3
                            <ol>
                                <li>Sub Item A</li>
                                <li>Sub Item B
                                    <ol>
                                        <li>Deep Item 1</li>
                                        <li>Deep Item 2</li>
                                    </ol>
                                </li>
                            </ol>
                        </li>
                        <li>Main Item 4</li>
                    </ol>
                </div>

                <div class="col-md-2 d-grid gap-2">
                    <button class="btn btn-danger" onclick="firstSelector()">Try it 1</button>
                    <button class="btn btn-info" onclick="secondSelector()">Try it 2</button>
                    <button class="btn btn-secondary" onclick="thirdSelector()">Try it 3</button>
                    <button class="btn btn-primary" onclick="window.location.reload()">Reset</button>
                </div>

                <div class="col-md-4" id="shoppingList">
                    <h3>My Shopping List</h3>
                    <div class="input-group mb-3">
                        <input type="text" id="item" class="form-control" placeholder="Add item...">
                        <button class="btn btn-success" id="add-btn">Add</button>
                    </div>
                    <ul class="list-group"></ul>
                </div>
            </div>
        </div>
    </main>

    <div style="height: 1500px;"></div>
    <div class="text-center p-5">
        <button id="bottomBtn" class="btn btn-warning">You focused on me!</button>
    </div>

    <script>
        // Step 18/19: Logic for coloring lists
        function firstSelector() {
            document.querySelector("#nestedList > li").style.backgroundColor = "#dc3545";
        }

        function secondSelector() {
            var x = document.querySelectorAll("#nestedList > li");
            for (var i = 0; i < x.length; i++) {
                x[i].style.backgroundColor = "#17a2b8";
            }
        }

        function thirdSelector() {
            document.querySelector("#nestedList ol li").style.backgroundColor = "#6c757d";
        }

        // Shopping List Logic
        const input = document.getElementById('item');
        const btn = document.getElementById('add-btn');
        const list = document.querySelector('#shoppingList ul');

        btn.onclick = function() {
            if (input.value === "") return;
            let val = input.value;
            input.value = '';

            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.innerHTML = `<span>${val}</span><button class="btn btn-sm btn-danger">Delete</button>`;
            
            list.appendChild(li);

            li.querySelector('button').onclick = function() {
                list.removeChild(li);
            };
            input.focus();
        }
    </script>
</body>
</html>
