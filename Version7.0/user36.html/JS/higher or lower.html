<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower</title>

    <script>
    
    var answer = Math.floor(Math.random() * 100) + 1;

    function checkGuess() {

        
        var guess = document.getElementById("guessBox").value;

        
        if (guess < answer) {
            alert("higher");
        }
        else if (guess > answer) {
            alert("lower");
        }
        else {
            alert("Success! The number was " + answer);
        }

        
        document.getElementById("guessBox").value = "";
    }
 </script>

    <style>
        body{
            background-color: rgb(0, 0, 0);
            font-family: "Times New Roman", serif;
        }

        .container{
            width: 85%;
            height: 550px;
            background-color: black;
            margin: 50px auto;
            border-radius: 10px;
            text-align: center;
            color: white;
            padding-top: 40px;
        }

        h1{
            font-size: 60px;
            margin-bottom: 40px;
        }

        label{
            font-size: 22px;
            font-weight: bold;
        }

        input{
            width: 250px;
            height: 30px;
            font-size: 18px;
            margin-top: 10px;
        }

        button{
            height: 36px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Higher or Lower</h1>

        <label>Guess a number between 1 and 100:</label>
        <br><br>

        <input type="text" id="guessBox">
        <button onclick="checkGuess()">Submit</button>
    </div>

</body>
</html>
