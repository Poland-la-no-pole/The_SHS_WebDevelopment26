<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math</title>

    <style>
        body {
        
            margin: 40px;
        }

        input {
            width: 250px;
            height: 30px;
            margin: 10px 0;
            font-size: 18px;
        }

        button {
            height: 38px;
            font-size: 18px;
            margin-left: 5px;
        }

        h1 {
            margin-top: 40px;
        }
    </style>

    <script>
        function addNumbers() {
            var num1 = Number(document.getElementById("add1").value);
            var num2 = Number(document.getElementById("add2").value);

            alert("Answer: " + (num1 + num2));
        }

        function multiplyNumbers() {
            var num1 = Number(document.getElementById("mult1").value);
            var num2 = Number(document.getElementById("mult2").value);

            alert("Answer: " + (num1 * num2));
        }

        function findC() {
            var a = Number(document.getElementById("sideA").value);
            var b = Number(document.getElementById("sideB").value);

            var c = Math.sqrt((a * a) + (b * b));

            alert("C = " + c);
        }
    </script>
</head>

<body>

    
    <input type="text" id="add1">
    +
    <input type="text" id="add2">

    <button onclick="addNumbers()">add</button>

    <br><br>

    
    <input type="text" id="mult1">
    *
    <input type="text" id="mult2">

    <button onclick="multiplyNumbers()">multiply</button>

    <h1>Pythagorean Theorem</h1>


    a=
    <input type="text" id="sideA">

    <br>

    b=
    <input type="text" id="sideB">

    <br>

    <button onclick="findC()">Find C</button>

</body>
</html>
