<!DOCTYPE html>
<html>
<head>
    <title>Three Buttons Activity</title>

    <script>
        // Function with one alert
        function oneAlert() {
            alert("This is alert number 1");
        }

        // Function with two alerts
        function twoAlerts() {
            alert("This is alert number 1");
            alert("This is alert number 2");
        }

        // Function with three alerts
        function threeAlerts() {
            alert("This is alert number 1");
            alert("This is alert number 2");
            alert("This is alert number 3");
        }
    </script>
</head>

<body>
    <main>
        <input onclick="oneAlert()" type="button" value="One">

        <input onclick="twoAlerts()" type="button" value="Two">

        <input onclick="threeAlerts()" type="button" value="Three">
    </main>
</body>
</html>
