<!DOCTYPE html>
<html>
    <head>
        <script>
            const answer = Math.floor(Math.random()*100)+1;
            function checkGuess(){
                const userIn = document.getElementById("num").value;
                alert(answer)
                        if(answer > userIn){
                            alert("Higher")
                        }else if (answer < userIn){
                            alert("Lower")
                        }else if (answer == userIn){
                            alert("Success")
                        }
                        document.getElementById("num").value=''
            }
        </script>
        <style>
            .more{
                background-color: black;
                color: white;
                text-align: center;
            }
        </style>
    </head>

    <body class="more">
        <main>
            <h1>Higher or Lower</h1>
            <div>Guess between 1 and 100</div>
            <input id="num" type="text" />
            <input id="sumButton" onclick="checkGuess()" type="button" value="submit" />
        </main>
    </body>
</html>
