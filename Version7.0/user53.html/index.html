<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JavaScript Math</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        /* Matches the large input style from your screenshot */
        input {
            width: 300px;
            height: 40px;
            font-size: 28px;
            margin: 5px;
        }

        button {
            height: 48px;
            font-size: 28px;
            cursor: pointer;
            padding: 0 15px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 30px;
            margin: 10px 0;
        }

        .section {
            margin-bottom: 40px;
        }

        .symbol {
            font-size: 40px;
            vertical-align: middle;
        }

        .result-text {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="section">
        <input id="add1" type="number">
        <span class="symbol"> + </span>
        <input id="add2" type="number">
        <button onclick="addNumbers()">add</button>
        <p id="addOutput" class="result-text"></p>
    </div>

    <div class="section">
        <input id="multiply1" type="number">
        <span class="symbol"> * </span>
        <input id="multiply2" type="number">
        <button onclick="multiplyNumbers()">multiply</button>
        <p id="multiplyOutput" class="result-text"></p>
    </div>

    <div class="section">
        <h1>Pythagorean Theorem</h1>
        <p>
            a= <input id="aValue" type="number">
        </p>
        <p>
            b= <input id="bValue" type="number">
        </p>
        <button onclick="findC()">Find C</button>
        <p id="cOutput" class="result-text"></p>
    </div>

    <script>
        // Addition Logic
        function addNumbers() {
            let num1 = Number(document.getElementById("add1").value);
            let num2 = Number(document.getElementById("add2").value);
            let answer = num1 + num2;
            document.getElementById("addOutput").innerHTML = "Result: " + answer;
        }

        // Multiplication Logic
        function multiplyNumbers() {
            let num1 = Number(document.getElementById("multiply1").value);
            let num2 = Number(document.getElementById("multiply2").value);
            let answer = num1 * num2;
            document.getElementById("multiplyOutput").innerHTML = "Result: " + answer;
        }

        // Pythagorean Logic: c = √(a² + b²)
        function findC() {
            let a = Number(document.getElementById("aValue").value);
            let b = Number(document.getElementById("bValue").value);
           
            if (a > 0 && b > 0) {
                let c = Math.sqrt((a * a) + (b * b));
                // toFixed(2) limits the result to 2 decimal places for neatness
                document.getElementById("cOutput").innerHTML = "c = " + c.toFixed(2);
            } else {
                document.getElementById("cOutput").innerHTML = "Please enter values for a and b";
            }
        }
    </script>

</body>
</html>
