<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;text-align:center}
        header,footer{background:#343a40;color:#fff;padding:20px}
        section{background:#fff;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1);padding:20px;margin-bottom:20px}
        #box{width:150px;height:150px;background:red;margin:20px auto;display:none;cursor:pointer}
        #colorSquare{width:200px;height:200px;background:blue;margin:20px auto}
    </style>
</head>
<body>
<header class="container">
    <h1>JavaScript Games</h1>
    <p>Simple Interactive Webpage</p>
</header>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-8">
            <section>
                <h2>Reaction Game</h2>
                <button id="startBtn" class="btn btn-success mb-2">Start</button>
                <div id="box"></div>
                <h3 id="result">Click start</h3>
            </section>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-8">
            <section>
                <h2>Color Changer</h2>
                <div id="colorSquare"></div>
                <button id="colorBtn" class="btn btn-primary">Change Color</button>
            </section>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-8">
            <section>
                <h2>Counter Game</h2>
                <h1 id="score">0</h1>
                <button id="addBtn" class="btn btn-danger">Add Point</button>
                <button id="resetBtn" class="btn btn-dark">Reset</button>
            </section>
        </div>
    </div>
</div>

<footer class="container">
    <p>JavaScript Assignment</p>
</footer>

<script>
window.addEventListener('load', () => alert('Welcome to my JavaScript Games!'))

const box = document.getElementById('box')
const result = document.getElementById('result')
const scoreEl = document.getElementById('score')
const colors = ['red', 'blue', 'green', 'purple', 'orange', 'pink']

let startTime = 0
let score = 0

document.getElementById('startBtn').addEventListener('click', () => {
    result.textContent = 'Wait for the box...'
    box.style.display = 'none'
    startTime = 0
    setTimeout(() => {
        box.style.display = 'block'
        startTime = Date.now()
    }, Math.random() * 3000)
})

box.addEventListener('click', () => {
    if (!startTime) return
    result.textContent = 'Your time: ' + ((Date.now() - startTime) / 1000).toFixed(3) + ' seconds'
    box.style.display = 'none'
    startTime = 0
})

document.getElementById('colorBtn').addEventListener('click', () => {
    document.getElementById('colorSquare').style.background =
        colors[Math.floor(Math.random() * colors.length)]
})

document.getElementById('addBtn').addEventListener('click', () => {
    score += 1
    scoreEl.textContent = score
})

document.getElementById('resetBtn').addEventListener('click', () => {
    score = 0
    scoreEl.textContent = score
})
</script>
</body>
</html>
