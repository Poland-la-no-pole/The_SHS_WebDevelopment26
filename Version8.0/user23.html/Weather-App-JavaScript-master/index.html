<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App - JavaScript</title>
    <link rel="stylesheet" href="font/Rimouski.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="weather-outer-container">
        <div class="app-title">
            <p>Weather</p>
        </div>
        <div class="notification"> </div>
        <div class="weather-container">
            <div class="weather-icon">
                <img src="icons/unknown.png" alt="">
            </div>
            <div class="temperature-value">
                <p>- °<span>C</span></p>
            </div>
            <div class="temperature-description">
                <p> - </p>
            </div>
            <div class="location">
                <p><a href="weather/Weather-App-JavaScript-master/index.html">View My Weather App Project</a></p>
            </div>
        </div>
        <div style="background-color: #e5f0fd; width: 100%; max-width: 400px; margin: 20px auto 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); font-family: sans-serif; box-sizing: border-box;">
            
            <div style="display: flex; align-items: center; margin-bottom: 15px; color: #64748b;">
                <span style="font-size: 1.1em; margin-right: 8px;">☔</span>
                <span style="font-size: 0.75em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Next-Hour Precipitation</span>
            </div>

            <div style="display: flex; align-items: flex-end; justify-content: space-between; height: 50px; padding: 0 5px; border-bottom: 2px solid #cbd5e1; margin-bottom: 8px;">
                <div style="background-color: #38bdf8; width: 6px; height: 35%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 40%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 45%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 52%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 58%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 65%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 72%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 78%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 80%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 75%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 68%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 62%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 55%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 50%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 48%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 45%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 45%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 48%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 52%; border-radius: 2px 2px 0 0;"></div>
                <div style="background-color: #38bdf8; width: 6px; height: 55%; border-radius: 2px 2px 0 0;"></div>
            </div>

            <div style="display: flex; justify-content: space-between; font-size: 0.7em; color: #94a3b8; font-weight: bold; padding: 0 2px;">
                <div>Now</div>
                <div>10m</div>
                <div>20m</div>
                <div>30m</div>
                <div>40m</div>
                <div>50m</div>
            </div>
        </div>

        

        <div style="display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #eaeaea; padding-top: 10px; font-family: sans-serif; font-size: 0.75em; color: #555;">
                <div>💧 Humidity: 78%</div>
                <div>💨 Wind: 10 mph</div>
            </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 6px 10px; background-color: #fcfdfd; border: 1px solid #eef2f5; border-radius: 6px; font-family: sans-serif; font-size: 0.75em; color: #475569;">
                <span>🍃 Air Quality Index:</span>
                <span style="color: #10b981; font-weight: bold;">Good (Zone 1)</span>
            </div>

            <div style="text-align: center; margin-top: 12px;">
                <span style="background-color: #fef3c7; color: #d97706; padding: 3px 10px; border-radius: 20px; font-size: 0.7em; font-family: sans-serif; font-weight: bold;">
                    ☀️ UV INDEX: 4(moderate)
                </span>
            </div>

            <footer style="text-align: center; margin-top: 15px; font-size: 0.65em; color: #94a3b8; border-top: 1px dotted #e2e8f0; padding-top: 8px; font-family: sans-serif;">
                © 2026 weather |  v8.0
            </footer>
    <script src="app.js"></script>
</body>
</html>
