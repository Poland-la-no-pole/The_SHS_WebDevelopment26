<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App - JavaScript</title>
    <link rel="stylesheet" href="font/Rimouski.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="weather-outer-container">
        <div class="app-title">
            <p>Weather</p>
        </div>
        <div class="notification"></div> 

        <!-- ADD THIS NEW FORM HERE -->
        <form id="weather-form">
            <input type="number" id="input-lat" step="any" placeholder="Latitude (e.g. 44.7974)" required>
            <input type="number" id="input-lon" step="any" placeholder="Longitude (e.g. -93.5273)" required>
            <button type="submit">Update Weather</button>
        </form>
        
        <div class="weather-container">
            <div class="time-container">
                <p id="local-time">-</p>
                <p id="timezone-offset">-</p>
            </div>
            <div class="weather-icon">
                <img src="icons/unknown.png" alt="unknown">
            </div>
            <div class="temperature-value">
                <p>- °<span>C</span></p>
            </div>
            <div class="temperature-description">
                <p> - </p>
            </div>
            <div class="location">
                <p>-</p>
            </div>
            <div class="extra-features">
                <div class="humidity">Humidity: <span>-</span>%</div>
                <div class="wind">Wind: <span>-</span> m/s</div>
                <div class="pressure">Pressure: <span>-</span> hPa</div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
