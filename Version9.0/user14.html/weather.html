<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Tornado Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="safety.html">Safety</a></li>
                    <li class="nav-item"><a class="nav-link" href="science.html">Science</a></li>
                    <li class="nav-item"><a class="nav-link" href="famous.html">Famous Tornadoes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="weather.html">Weather</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section class="page-section">
            <h1 class="section-title">Weather Check</h1>
            <p>
                Enter a city to see its current weather.
            </p>

            <div class="row g-4 mt-2">
                <div class="col-lg-5">
                    <div class="mini-panel">
                        <label for="cityInput" class="form-label fw-semibold">City</label>
                        <input type="text" id="cityInput" class="form-control mb-3" placeholder="Enter a city">
                        <button class="btn btn-dark w-100" onclick="getWeather()">Get Weather</button>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div id="weatherResult" class="weather-result mini-panel">
                        <h2 class="h4">Results</h2>
                    </div>
                    <div id="riskResult" class="mini-panel mt-4">
                        <h2 class="h4">Tornado Risk</h2>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section mt-5">
            <h2 class="section-title">How this works</h2>
            <p>
                You type in a city and it shows the weather
            </p>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container py-3 text-center">
            <p class="mb-0">Tornado Tracker | <span id="year"></span></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
