<body>
 <button onclick="getAnimalFact()">Get Animal Fact</button>

    <p id="animalFact">Click the button to learn something new!</p>
    <header class="site-header shadow-sm">
    <nav class="navbar navbar-expand-lg container">
      <a class="navbar-brand" href="index.html">Animals</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html" data-page="home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html" data-page="movies">Search</a></li>

        </ul>
      </div>
    </nav>

  <main class="container py-5">
    <section class="page-intro mb-5">
      <h1>Search Animals</h1>
      <p class="lead">Search for information about different animals and learn facts.</p>
    </section>

    <section class="search-panel mb-4">
      <div class="input-group">
        <input id="searchQuery" type="search" class="form-control" placeholder="Search for an animal" aria-label="Search for an animal">
        <button class="btn btn-accent" type="button" onclick="searchAnimal(document.getElementById('searchQuery').value)">Search</button>
      </div>
      <div class="genre-buttons mt-3">
        <button class="btn btn-accent btn-sm" onclick="searchAnimal('lion')">Lion</button>
        <button class="btn btn-accent btn-sm" onclick="searchAnimal('elephant')">Elephant</button>
        <button class="btn btn-accent btn-sm" onclick="searchAnimal('panda')">Panda</button>
        <button class="btn btn-accent btn-sm" onclick="searchAnimal('dolphin')">Dolphin</button>
      </div>
      <p id="statusMessage" class="status mt-3"></p>
    </section>

    <section id="animalResults" class="row gy-4"></section>
  </main>

  <footer class="page-footer text-center py-4">
