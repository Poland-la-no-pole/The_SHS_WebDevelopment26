<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery | Animals</title>
  <link rel="stylesheet" href="CSS/product.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .animal-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #2e8b57 0%, #1a4d2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg container">
      <a class="navbar-brand" href="index.html">Animals</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html" data-page="home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html" data-page="movies">Search</a></li>
          <li class="nav-item"><a class="nav-link" href="top10.html" data-page="top10">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html" data-page="about">About</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <section class="page-intro mb-4">
      <h1>Gallery</h1>
      <p class="lead">A collection of fascinating animals. Click any card to reveal more details.</p>
    </section>

    <section id="galleryContainer" class="row gy-4"></section>
  </main>

  <footer class="page-footer text-center py-4">
    <p>&copy; 2026 • Animal exploration project</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/SampleJS.js"></script>
  <script>
    function renderGallery() {
      const container = document.getElementById('galleryContainer');
      if (!container) return;
      
      const galleryAnimals = ['lion', 'elephant', 'giraffe', 'penguin', 'dolphin', 'panda', 'tiger', 'eagle', 'butterfly', 'whale'];
      
      galleryAnimals.forEach((animalKey, index) => {
        const animal = animalDatabase[animalKey];
        if (!animal) return;
        
        const detailsId = 'detail-' + index;
        
        const card = document.createElement('div');
        card.className = 'col-md-6';
        card.innerHTML = '<article class="animal-card"><img src="' + animal.image + '" alt="' + animal.name + '" style="width: 100%; height: 300px; object-fit: contain; background-color: #f5f5f5; border-radius: 0.5rem;"><div class="card-body"><h2>' + animal.name + '</h2><p class="meta">' + animal.type + ' • ' + animal.habitat + '</p><button class="btn btn-accent btn-sm" onclick="toggleDetails(\'' + detailsId + '\')">Learn more</button><div id="' + detailsId + '" class="details mt-3"><p>' + animal.description + '</p></div></div></article>';
        
        container.appendChild(card);
      });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      renderGallery();
      setActivePage();
    });
  </script>
</body>
</html>
