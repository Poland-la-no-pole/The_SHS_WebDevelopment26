<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Artillery Game</title>

    <link rel="stylesheet" href="CSS/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="text-center">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="#">Iron Clash</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="tanks.html">Tanks</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="battle.html">Battle</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="artillery.html">Artillery</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

    <div class="container text-center mt-4">

    <h1>🎯 2 Player Artillery Battle</h1>

    <canvas id="gameCanvas" width="600" height="300"
    style="border:1px solid black;"></canvas>

    <h2 id="turnText">Player 1 Turn</h2>

        <h3>Player 1 Fuel: <span id="p1fuel">100</span></h3>
        <h3>Player 2 Fuel: <span id="p2fuel">100</span></h3>

        <h3>
            Player 1 HP:
            <span id="p1hp">100</span>
        </h3>

        <h3>
            Player 2 HP:
            <span id="p2hp">100</span>
        </h3>

    <input type="number" id="angle" placeholder="Angle (0-90)" class="form-control w-50 mx-auto mt-2">
    <input type="number" id="power" placeholder="Power (1-100)" class="form-control w-50 mx-auto mt-2">

    <button class="btn btn-danger mt-3" onclick="fire()">FIRE</button>

    <button onclick="moveLeft()">⬅ Move Left</button>

    <button onclick="moveRight()">Move Right ➡</button>

    <h3 id="result" class="mt-3"></h3>

</div>

<script src="JS/script.js" defer></script>

</body>
</html>
