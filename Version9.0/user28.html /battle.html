        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        <div class="collapse navbar-collapse" id="navbarNav">

<div class="container mt-5 text-center">

        <input type="number" id="pen" placeholder="Gun Penetration (mm)" class="form-control w-50 mx-auto mt-3">

        <input type="number" id="caliber"
        placeholder="Shell Caliber (mm)"
        class="form-control w-50 mx-auto mt-3">

        <input type="number" id="filler"
        placeholder="Explosive Filler (g TNT)"
        class="form-control w-50 mx-auto mt-3">

        <input type="number" id="armor" placeholder="Armor Thickness (mm)" class="form-control w-50 mx-auto mt-3">

        <input type="number" id="angle" placeholder="Armor Angle (degrees)" class="form-control w-50 mx-auto mt-3">

        <button class="btn btn-warning mt-3" onclick="calculatePen()">
            Check Penetration
