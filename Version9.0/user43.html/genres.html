<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genres - Show Explorer</title>


    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/069/992/561/small/movie-clapper-board-isolated-on-transparent-background-png.png">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>

<style>

body {
    background-color: #141414;
    color: white;
    font-family: 'Poppins', sans-serif;
}


.navbar {
    background-color: #0d0d0d;
}

.navbar-brand {
    color: #b300ff ;
    font-weight: bold;
}

.nav-link {
    color: white;
}

.nav-link:hover {
    color: #b300ff;
}


h1 {
    font-size: 45px;
    font-weight: bold;
}

p {
    color: #bbbbbb;
    margin-top: 10px;
}



.genre-btn {
    background-color: transparent;
    color: white;
    border: 1px solid #b300ff;
    padding: 10px 22px;
    margin: 6px;
    border-radius: 50px;
    font-size: 14px;
    transition: 0.3s;
    cursor: pointer;
}

.genre-btn:hover {
    background-color: #b300ff;
    color: white;
    transform: scale(1.05);
    box-shadow: 0 0 12px #b300ff;
}

.genre-btn:active {
    transform: scale(0.95);
}



.container.text-center {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}



button,
.btn {
    background-color: #b300ff;
    color: white;
    border: none;
    transition: 0.3s;
}

button:hover,
.btn:hover {
    background-color: #7a00cc;
    transform: scale(1.05);
}


footer {
    background-color: #0d0d0d;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

</style>



<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="index.html">🎬 Show Explorer</a>

    <div class="collapse navbar-collapse show">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="shows.html">Shows</a></li>
            <li class="nav-item"><a class="nav-link active" href="genres.html">Genres</a></li>
            <li class="nav-item"><a class="nav-link" href="recommendations.html">Recommendations</a></li>
            <li class="nav-item"><a class="nav-link" href="watchlist.html">Watchlist</a></li>

        </ul>

    </div>
</nav>

<!-- HEADER -->
<div class="container text-center my-4">
    <h1>Browse by Genre</h1>
</div>

<!-- GENRE BUTTONS -->
<div class="container text-center mb-4">

    <button class="btn btn-dark m-1" onclick="filterGenre('action')">Action</button>
    <button class="btn btn-dark m-1" onclick="filterGenre('comedy')">Comedy</button>
    <button class="btn btn-dark m-1" onclick="filterGenre('drama')">Drama</button>
    <button class="btn btn-dark m-1" onclick="filterGenre('sci-fi')">Sci-Fi</button>

</div>

<!-- RESULTS -->
<div class="container">
    <div class="row" id="genreResults"></div>
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-4 bg-dark text-white">
    <p>Show Explorer © 2026</p>
</footer>

<!-- JS -->
<script src="JS/SampleJS.js"></script>

<script>


const showsByGenre = {
    action: ["Person of Interest", "The Rookie", "NCIS", "The Mandalorian", "The 100", "Chicago Fire", "Citadel", "The Night Manager", "Teen Wolf"],
    comedy: ["Brooklyn Nine-Nine", "Friends","Abbott Elementary", "Broad City", "Wonder Man", "Key & Peele", "Saturday Night Live", "Seinfield", "The Office" ],
    drama: ["Breaking Bad", "The Crown","Grey's Anatomy", "Virgin River","My Life with the Walter Boys", "ER", "Gossip Girl", "This is Us", "Mad Men" ],
    "sci-fi": ["Stranger Things", "Black Mirror","Colony", "Fringe", "Foundation", "The Ark", "Pluribus", "Lost", "Falling Skies" ]
};

function filterGenre(genre) {

    let results = showsByGenre[genre];

    let output = "";

    results.forEach(show => {

        output += `
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">

                <div class="card-body text-center">

                    <h3>${show}</h3>

                    <button class="btn btn-dark"
                        onclick="addToWatchlist('${show}')">
                        Add to Watchlist
                    </button>

                </div>

            </div>
        </div>
        `;
    });

    document.getElementById("genreResults").innerHTML = output;
}
</script>

</body>
</html>
