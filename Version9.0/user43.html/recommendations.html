<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Show Explorer</title>

    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/069/992/561/small/movie-clapper-board-isolated-on-transparent-background-png.png">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>


<style>
/* RECOMMENDATIONS PAGE */

body {
background-color: #141414;
color: white;
font-family: 'Poppins', sans-serif;
}

h1 {
font-size: 50px;
font-weight: bold;
color: white;
}

h2 {
color: white;
}

h3 {
color: rgb(255, 255, 255);
}

p {
color: #bbbbbb;
}

/* Form Inputs */
.form-control {
    background-color: #1f1f1f;
    color: white;
    border: 1px solid #333;
}

.form-control::placeholder {
    color: #888;
}

.form-control:focus {
    background-color: #1f1f1f;
    color: white;
    border-color: #b300ff;
    box-shadow: 0 0 10px #b300ff;
}

/* Cards */
.card {
background-color: #1f1f1f;
border: none;
color: white;
transition: 0.3s;
}

.card:hover {
transform: scale(1.03);
}

/* Buttons */
.btn {
background-color: #b300ff;
color: white;
border: none;
}

.btn:hover {
background-color: #8a00cc;
color: white;
}

/* Navbar */
.navbar {
background-color: #0d0d0d;
}

.navbar-brand {
color: #b300ff ;
font-weight: bold;
}

.nav-link {
color: white ;
}

.nav-link:hover {
color: #b300ff;
}

/* Footer */
footer {
background-color: #0d0d0d;
color: white;
}

</style>


<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="index.html">
        🎬 Show Explorer
    </a>

    <div class="collapse navbar-collapse show">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="shows.html">Shows</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="genres.html">Genres</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="recommendations.html">Recommendations</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="watchlist.html">Watchlist</a>
            </li>

        </ul>

    </div>

</nav>

<!-- HEADER -->
<div class="container text-center my-5">

    <h1 class="mb-3">
        Recommend a Show!
    </h1>

    <p class="mb-4">
        Share your favorite TV shows!
    </p>

</div>

<!-- FORM -->
<!-- RECOMMENDATION FORM -->
<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">
                    Submit a Recommendation
                </h3>

                <input
                    type="text"
                    id="showName"
                    class="form-control mb-3"
                    placeholder="Show Name">

                <textarea
                    id="showReason"
                    class="form-control mb-3"
                    rows="4"
                    placeholder="Why do you recommend this show?"></textarea>

                <button
                    class="btn"
                    onclick="submitRecommendation()">

                    Submit Recommendation

                </button>

            </div>

        </div>

    </div>

</div>

<!-- RECOMMENDATIONS LIST -->
<div class="container my-5">

    <h2 class="text-center mb-4">
    </h2>

    <div class="row" id="recommendationList">

    </div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4 mt-5">

    <p>Show Explorer © 2026</p>

</footer>

<!-- JAVASCRIPT -->
<script>
function submitRecommendation() {

    let showName = document.getElementById("showName").value;
    let showReason = document.getElementById("showReason").value;

    if (showName === "" || showReason === "") {

        alert("Please fill out both fields.");
        return;
    }

    document.getElementById("recommendationList").innerHTML += `

        <div class="col-md-4 mb-4">

            <div class="card h-100 shadow">

                <div class="card-body text-center">

                    <h3>${showName}</h3>

                    <p>${showReason}</p>

                </div>

            </div>

        </div>

    `;

    document.getElementById("showName").value = "";
    document.getElementById("showReason").value = "";
}

</script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
