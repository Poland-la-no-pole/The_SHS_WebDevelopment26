<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shows - Show Explorer</title>

    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/069/992/561/small/movie-clapper-board-isolated-on-transparent-background-png.png">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>


<style>
    

body {
    background-color: #141414;
    color: white;
    font-family: 'Poppins', sans-serif;
}


.navbar {
    background-color: #0d0d0d;
}

.navbar-brand {
    color: #b300ff ; 
    font-weight: bold;
}

.nav-link {
    color: white ;
}

.nav-link:hover {
    color: #b300ff ;
}


h1 {
    color: white;
    font-size: 45px;
    font-weight: bold;
}

p {
    color: #bbbbbb;
}


input {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
    outline: none;
}

input:focus {
    box-shadow: 0 0 10px #b300ff;
}


button,
.btn {
    background-color: #b300ff;
    color: white;
    border: none;
    transition: 0.3s;
}

button:hover,
.btn:hover {
    background-color: #7a00cc;
    transform: scale(1.05);
}

.col-md-4 {
    display: flex;
}

.card {
    display: flex;
    flex-direction: column;
    width: 100%;
    min-height: 600px;
    background-color: #1f1f1f;
    border: none;
    color: white;
    transition: 0.3s;
}

.card img {
    height: 320px;
    width: 100%;
    object-fit: cover;
}

.card-body {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.card:hover {
    transform: scale(1.03);
}


footer {
    background-color: #0d0d0d;
    color: white;
}
</style>








<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="index.html">🎬 Show Explorer</a>

    <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">

            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="shows.html">Shows</a></li>
            <li class="nav-item"><a class="nav-link" href="genres.html">Genres</a></li>
            <li class="nav-item"><a class="nav-link" href="recommendations.html">Recommendations</a></li>
            <li class="nav-item"><a class="nav-link" href="watchlist.html">Watchlist</a></li>

        </ul>
    </div>

</nav>

<!-- TITLE -->
<div class="container text-center my-4">
    <h1>Search TV Shows</h1>
    <p>Type a show name below to explore details and add it to your watchlist!</p>
</div>

<!-- SEARCH BAR -->
<div class="container text-center mb-4">

    <input type="text" id="searchInput" placeholder="Search shows...">
    <button class="btn btn-danger" onclick="searchShows()">Search</button>

</div>

<!-- RESULTS -->
<div class="container">
    <div class="row" id="results"></div>
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-4 bg-dark text-white">
    <p>Show Explorer © 2026</p>
</footer>

<!-- JS -->
<script src="JS/SampleJS.js"></script>

<script>

function searchShows() {

    let query = document.getElementById("searchInput").value;

    fetch("https://api.tvmaze.com/search/shows?q=" + query)
        .then(response => response.json())
        .then(data => {

            let output = "";

            data.forEach(item => {

                let show = item.show;

                output += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow">

                        <img src="${show.image ? show.image.medium : ''}" class="card-img-top">

                        <div class="card-body text-center">

                            <h3>${show.name}</h3>

                            <p>Rating: ${show.rating.average || "N/A"}</p>

                            <button class="btn btn-dark"
                                onclick="addToWatchlist('${show.name}')">
                                Add to Watchlist
                            </button>

                        </div>
                    </div>
                </div>
                `;
            });

            document.getElementById("results").innerHTML = output;
        });
}
</script>

</body>
</html>
