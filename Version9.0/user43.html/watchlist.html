<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - Show Explorer</title>

    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/thumbnails/069/992/561/small/movie-clapper-board-isolated-on-transparent-background-png.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<style>
    body {
    background-color: #141414;
    color: white;
    font-family: 'Poppins', sans-serif;
}


/* Watchlist cards */
#watchlistContainer .card {
    background-color: #1f1f1f;
    border: none;
    color: white;
    transition: 0.3s;
}

#watchlistContainer .card:hover {
    transform: scale(1.03);
}

/* Titles */
h1, h2, h3 {
    color: white;

}
.page-title {
    font-size: 50px;
    font-weight: bold;
    text-align: center;
    color: white;
}

/* Purple button theme */
.btn {
    background-color: #b300ff;
    color: white;
    border: none;
}

.btn:hover {
    background-color: #7a00cc;
}

/* Navbar */
.navbar {
    background-color: #0d0d0d;
}

.navbar-brand {
    color: #b300ff;
    font-weight: bold;
}

.nav-link {
    color: white ;
}

.nav-link:hover {
    color: #b300ff ;
}
</style>



<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="index.html">🎬 Show Explorer</a>

    <div class="collapse navbar-collapse show">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="shows.html">Shows</a></li>
            <li class="nav-item"><a class="nav-link" href="genres.html">Genres</a></li>
            <li class="nav-item"><a class="nav-link" href="recommendations.html">Recommendations</a></li>
            <li class="nav-item"><a class="nav-link active" href="watchlist.html">Watchlist</a></li>

        </ul>

    </div>
</nav>

<!-- HEADER -->
<div class="container text-center my-5">

    <h1 class="page-title">My Watchlist</h1>
    <p>All your saved shows will appear here</p>

</div>

<!-- WATCHLIST -->
<div class="container">

    <div class="row" id="watchlistContainer">

    </div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4 mt-5">
    <p>Show Explorer © 2026</p>
</footer>

<!-- JS -->
<script src="JS/SampleJS.js"></script>

<script>

function loadWatchlist() {

    let list = JSON.parse(localStorage.getItem("watchlist")) || [];

    let output = "";

    list.forEach(show => {

        output += `
        <div class="col-md-4 mb-4">

            <div class="card h-100 shadow">

                <div class="card-body text-center">

                    <h3>${show}</h3>

                    <button class="btn btn-dark"
                        onclick="removeFromWatchlist('${show}')">
                        Remove
                    </button>

                </div>

            </div>

        </div>
        `;
    });

    document.getElementById("watchlistContainer").innerHTML = output;
}

function removeFromWatchlist(showName) {

    let list = JSON.parse(localStorage.getItem("watchlist")) || [];

    list = list.filter(item => item !== showName);

    localStorage.setItem("watchlist", JSON.stringify(list));

    loadWatchlist();
}

loadWatchlist();

</script>

</body>
</html>
