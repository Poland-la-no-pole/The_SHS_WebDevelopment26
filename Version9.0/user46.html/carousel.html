    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #b8b8b8 0%, #b8b8b8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 10px;
        }
         .menu {
            width: 100%;
            margin-bottom: 20px;
        }
        .carousel {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    overflow: hidden;
}

.carousel-item {
    height: 500px;
    background-color: #000;
}

.carousel-item img {
    width: 100%;
    height: 500px;
    object-fit: cover;
}

.carousel-control-prev-icon,
.carousel-control-next-icon {
    background-color: rgba(0,0,0,0.5);
    border-radius: 50%;
    padding: 10px;
}

.carousel-indicators li {
    background-color: rgba(0,0,0,0.5);
}

.carousel-indicators .active {
    background-color: #007bff;
}

/* FIX NAVBAR LOGO */
.navbar-brand img {
    height: 30px;
    width: auto;
}
    </style>
</head>

<body>
    <div class="menu">
         <nav>
        <div style="background-color: rgb(0, 0, 0); padding: 10px;">
             <a href="index.html" style="color: rgb(255, 255, 255); text-decoration: none; margin-right: 10px;">Home</a>
             <a href="games.html" style="color: rgb(255, 255, 255); text-decoration: none; margin-right: 10px;">Games</a>

         </div>
     </nav>
    </div>
    <!---------------------------------- End the nav-bar ------------->
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2">
            </div>
            <div class="col-md-8">
                <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel" data-interval="5000">
                    <ol class="carousel-indicators">
                        <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                        <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                        <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
                    </ol>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img class="d-block w-100" src="images/2.jpg"
                                alt="First slide">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="images/1.jpg" alt="Second slide">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="images/tree.jpg"
                                alt="Third slide">
                        </div>
                    </div>
                    <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="sr-only">Previous</span>
                    </a>
                    <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="sr-only">Next</span>
                    </a>
                </div>
            </div>
            <div class="col-md-2">

            </div>
        </div>
    </div>

    <p>This carousel displays a series of images.</p>
     <p>Please admire this work because it took me so long to rework this feature.</p>
