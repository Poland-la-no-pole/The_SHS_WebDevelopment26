            body { font-family: Arial, sans-serif; margin: 50px; }

    <body>
        <div class="container">
            <center>
                <h1>Welcome! Enjoy these JS features!</h1>
                <button onclick="fetchQuote()">Get Random Quote</button>
                <button onclick="displayTime()">Show Current Time</button>
                <button onclick="calculateSum()">Calculate 1+2+3 (<b>Difficult Calculus)</b></button>
                <button onclick="fetchUserData()">Fetch Random User (why not)</button>
            </center>
            
            <div id="data">
                <p id="quote">Click the button to fetch a quote...</p>
                <p id="time"></p>
                <p id="sum"></p>
                <p id="user"></p>
            </div>
        </div>

        <script>
            // Array of fallback quotes
            const fallbackQuotes = [
                {
                    content: "The only way to do great work is to love what you do.",
                    author: "Steve Jobs"
                },
                {
                    content: "Innovation distinguishes between a leader and a follower.",
                    author: "Steve Jobs"
                },
                {
                    content: "Life is what happens when you're busy making other plans.",
                    author: "John Lennon"
                },
                {
                    content: "The future belongs to those who believe in the beauty of their dreams.",
                    author: "Eleanor Roosevelt"
                },
                {
                    content: "It is during our darkest moments that we must focus to see the light.",
                    author: "Aristotle"
                },
                {
                    content: "The way to get started is to quit talking and begin doing.",
                    author: "Walt Disney"
                },
                {
                    content: "Don't watch the clock; do what it does. Keep going.",
                    author: "By <b>Me</b>"
                },
                {
                    content: "Success is not final, failure is not fatal: It is the courage to continue that counts.",
                    author: "Winston Churchill"
                },
                {
                    content: "Believe you can and you're halfway there.",
                    author: "Theodore Roosevelt"
                }
            ];

            // Main function to fetch data from API
            function fetchQuote() {
                fetch('https://api.quotable.io/random')
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.json();
                    })
                    .then(data => {
                        displayQuote(data);
                        logQuoteInfo(data);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        // Fallback quote if API fails
                        const fallbackQuote = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                        displayQuote(fallbackQuote);
                    });
            }

            // Embedded function 1: Display quote from API
            function displayQuote(data) {
                const quoteElement = document.getElementById('quote');
                quoteElement.innerHTML = `<strong>Quote:</strong> "${data.content}" - ${data.author || 'Unknown'}`;
            }

            // Embedded function 2: Log quote information
            function logQuoteInfo(data) {
                console.log('Quote length:', data.content.length);
            }

            // Embedded function 3: Display current time
            function displayTime() {
                const timeElement = document.getElementById('time');
                const now = new Date().toLocaleTimeString();
                timeElement.innerHTML = `<strong>Current Time:</strong> ${now}`;
            }

            // Embedded function 4: Calculate sum
            function calculateSum() {
                const sum = add(1, add(2, 3));
                document.getElementById('sum').innerHTML = `<strong>Sum (1+2+3):</strong> ${sum}`;
            }

            // Embedded function 5: Add numbers
            function add(a, b) {
                return a + b;
            }

            // Embedded function 6: Fetch random user data from API
            function fetchUserData() {
                fetch('https://randomuser.me/api/')
                    .then(response => response.json())
                    .then(data => {
                        const user = data.results[0];
                        displayUserData(user);
                    })
                    .catch(error => console.error('Error:', error));
            }

            // Embedded function 7: Display user data
            function displayUserData(user) {
                const userElement = document.getElementById('user');
                userElement.innerHTML = `<strong>Random User:</strong> ${user.name.first} ${user.name.last} from ${user.location.country}`;
            }
        </script>
    
    </body>

</html>
