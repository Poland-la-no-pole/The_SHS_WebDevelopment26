<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two Games</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        section {
            margin-bottom: 40px;
        }
        .game-box {
            border: 1px solid #ccc;
            padding: 16px;
            border-radius: 8px;
            max-width: 420px;
        }
        button {
            margin: 4px;
            padding: 10px 14px;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 8px;
            margin-top: 12px;
        }
        .cell {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            border: 2px solid #444;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="menu">
        <nav class="navbar navbar-expand-md navbar-dark bg-dark">
            <div id="brand">
                <a href="http://shakonet.isd720.com" class="navbar-brand">
                    <img src="images/gugu.jpg">
                </a>
            </div>
            <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav">
                    <!--↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓ Edit These Items in your Menu ↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓-->
                    <a href="index.html" style="color: rgb(250, 5, 5); text-decoration: none; margin-right: 10px;">Home</a>
                    <a href="games.html" style="color: rgb(5, 155, 254); text-decoration: none; margin-right: 10px;">Games</a>
                    <a href="carousel.html" style="color: rgb(8, 252, 240); text-decoration: none;">Carousel</a>
                    
                    <!----------------------------------^ Edit These Items in your Menu ^ ------------->
                </div>
                <div class="navbar-nav ml-auto">
                    <a href="#" class="nav-item nav-link disabled">Login</a>
                </div>
            </div>
        </nav>
    </div>
    <section class="game-box">
        <h2>Game 1: Rock Paper Scissors</h2>
        <div>
            <button onclick="playRPS('rock')">Rock</button>
            <button onclick="playRPS('paper')">Paper</button>
            <button onclick="playRPS('scissors')">Scissors</button>
        </div>
        <p id="rps-result">Choose an option to play.</p>
    </section>

    <section class="game-box">
        <h2>Game 2: Tic Tac Toe</h2>
        <div id="tic-tac-toe" class="grid">
            <div class="cell" data-index="0" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="1" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="2" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="3" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="4" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="5" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="6" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="7" onclick="makeMove(this)"> </div>
            <div class="cell" data-index="8" onclick="makeMove(this)"> </div>
        </div>
        <p id="tic-result">X starts. Click a cell.</p>
        <button onclick="resetTicTacToe()">Reset Tic Tac Toe</button>
    </section>

    <script>
        function playRPS(choice) {
            const options = ['rock', 'paper', 'scissors'];
            const computer = options[Math.floor(Math.random() * options.length)];
            let result = '';
            if (choice === computer) {
                result = "It's a draw!";
            } else if (
                (choice === 'rock' && computer === 'scissors') ||
                (choice === 'paper' && computer === 'rock') ||
                (choice === 'scissors' && computer === 'paper')
            ) {
                result = 'You win!';
            } else {
                result = 'Computer wins!';
            }
            document.getElementById('rps-result').textContent =
                `You chose ${choice}, computer chose ${computer}. ${result}`;
        }

        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function makeMove(cell) {
            const index = cell.getAttribute('data-index');
            if (!gameActive || board[index] !== '') return;
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            checkWinner();
            if (gameActive) {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('tic-result').textContent = `${currentPlayer}'s turn.`;
            }
        }

        function checkWinner() {
            for (const pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (
                    board[a] &&
                    board[a] === board[b] &&
                    board[a] === board[c]
                ) {
                    gameActive = false;
                    document.getElementById('tic-result').textContent =
                        `${board[a]} wins!`;
                    return;
                }
            }
            if (!board.includes('')) {
                gameActive = false;
                document.getElementById('tic-result').textContent = 'Draw!';
            }
        }

        function resetTicTacToe() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            document.querySelectorAll('.cell').forEach(cell => cell.textContent = '');
            document.getElementById('tic-result').textContent = 'X starts. Click a cell.';
            
            const board2048 = {
                size: 4,
                cells: [],
                score: 0,
                active: true
            };

            function create2048Section() {
                const section = document.createElement('section');
                section.className = 'game-box';
                section.innerHTML = `
                <h2>Game 3: 2048</h2>
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                    <button id="reset-2048">New Game</button>
                    <span id="score-2048">Score: 0</span>
                </div>
                <div id="board-2048" class="grid-2048"></div>
                <p id="status-2048">Use arrow keys to move the tiles.</p>
                `;
                document.body.appendChild(section);
                inject2048Styles();
                document.getElementById('reset-2048').addEventListener('click', reset2048);
            }

            function inject2048Styles() {
                const style = document.createElement('style');
                style.textContent = `
                .grid-2048 {
                    display: grid;
                    grid-template-columns: repeat(4, 80px);
                    gap: 10px;
                }
                .tile-2048 {
                    width: 80px;
                    height: 80px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 8px;
                    font-size: 1.5rem;
                    font-weight: 700;
                    color: #776e65;
                    background: #cdc1b4;
                }
                .tile-2048.tile-0 { background: #eee4da; color: #776e65; }
                .tile-2048.tile-2 { background: #eee4da; }
                .tile-2048.tile-4 { background: #ede0c8; }
                .tile-2048.tile-8 { background: #f2b179; color: #f9f6f2; }
                .tile-2048.tile-16 { background: #f59563; color: #f9f6f2; }
                .tile-2048.tile-32 { background: #f67c5f; color: #f9f6f2; }
                .tile-2048.tile-64 { background: #f65e3b; color: #f9f6f2; }
                .tile-2048.tile-128 { background: #edcf72; color: #f9f6f2; }
                .tile-2048.tile-256 { background: #edcc61; color: #f9f6f2; }
                .tile-2048.tile-512 { background: #edc850; color: #f9f6f2; }
                .tile-2048.tile-1024 { background: #edc53f; color: #f9f6f2; }
                .tile-2048.tile-2048 { background: #edc22e; color: #f9f6f2; }
                `;
                document.head.appendChild(style);
            }

            function init2048() {
                board2048.cells = Array(board2048.size * board2048.size).fill(0);
                board2048.score = 0;
                board2048.active = true;
                addRandomTile2048();
                addRandomTile2048();
                render2048();
                updateStatus2048('Use arrow keys to move the tiles.');
            }

            function reset2048() {
                init2048();
            }

            function addRandomTile2048() {
                const emptyIndexes = board2048.cells
                .map((value, index) => value === 0 ? index : -1)
                .filter(index => index !== -1);
                if (emptyIndexes.length === 0) return;
                const index = emptyIndexes[Math.floor(Math.random() * emptyIndexes.length)];
                board2048.cells[index] = Math.random() < 0.9 ? 2 : 4;
            }

            function render2048() {
                const boardEl = document.getElementById('board-2048');
                boardEl.innerHTML = '';
                board2048.cells.forEach(value => {
                const tile = document.createElement('div');
                tile.className = `tile-2048 tile-${value}`;
                tile.textContent = value === 0 ? '' : value;
                boardEl.appendChild(tile);
                });
                document.getElementById('score-2048').textContent = `Score: ${board2048.score}`;
            }

            function updateStatus2048(message) {
                document.getElementById('status-2048').textContent = message;
            }

            function compressRow(row) {
                const filtered = row.filter(value => value !== 0);
                for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    board2048.score += filtered[i];
                    filtered[i + 1] = 0;
                    i++;
                }
                }
                const merged = filtered.filter(value => value !== 0);
                while (merged.length < board2048.size) merged.push(0);
                return merged;
            }

            function move2048(direction) {
                if (!board2048.active) return;
                let moved = false;

                if (direction === 'left' || direction === 'right') {
                for (let row = 0; row < board2048.size; row++) {
                    const start = row * board2048.size;
                    let line = board2048.cells.slice(start, start + board2048.size);
                    if (direction === 'right') line.reverse();
                    const compressed = compressRow(line);
                    if (direction === 'right') compressed.reverse();
                    for (let col = 0; col < board2048.size; col++) {
                    const position = start + col;
                    if (board2048.cells[position] !== compressed[col]) {
                        moved = true;
                        board2048.cells[position] = compressed[col];
                    }
                    }
                }
                } else {
                for (let col = 0; col < board2048.size; col++) {
                    let line = [];
                    for (let row = 0; row < board2048.size; row++) {
                    line.push(board2048.cells[row * board2048.size + col]);
                    }
                    if (direction === 'down') line.reverse();
                    const compressed = compressRow(line);
                    if (direction === 'down') compressed.reverse();
                    for (let row = 0; row < board2048.size; row++) {
                    const position = row * board2048.size + col;
                    if (board2048.cells[position] !== compressed[row]) {
                        moved = true;
                        board2048.cells[position] = compressed[row];
                    }
                    }
                }
                }

                if (!moved) return;
                addRandomTile2048();
                render2048();

                if (!canMove2048()) {
                board2048.active = false;
                updateStatus2048('Game over. Press New Game to restart.');
                } else if (board2048.cells.includes(2048)) {
                updateStatus2048('You reached 2048! Keep going or press New Game.');
                } else {
                updateStatus2048('Use arrow keys to move the tiles.');
                }
            }

            function canMove2048() {
                if (board2048.cells.includes(0)) return true;
                for (let row = 0; row < board2048.size; row++) {
                for (let col = 0; col < board2048.size - 1; col++) {
                    const index = row * board2048.size + col;
                    if (board2048.cells[index] === board2048.cells[index + 1]) return true;
                }
                }
                for (let col = 0; col < board2048.size; col++) {
                for (let row = 0; row < board2048.size - 1; row++) {
                    const index = row * board2048.size + col;
                    if (board2048.cells[index] === board2048.cells[index + board2048.size]) return true;
                }
                }
                return false;
            }

            function handle2048Key(event) {
                const mapping = {
                ArrowUp: 'up',
                ArrowDown: 'down',
                ArrowLeft: 'left',
                ArrowRight: 'right'
                };
                const direction = mapping[event.key];
                if (!direction) return;
                event.preventDefault();
                move2048(direction);
            }

            create2048Section();
            init2048();
            document.addEventListener('keydown', handle2048Key);
        }
    </script>
</body>
</html>
